name: subtitle-pinyin-converter

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: subtitle-converter
    ports:
      - "8080:8080"
    environment:
      - SUBTITLE_UPLOAD_PATH=/app/uploads
      - SUBTITLE_CONVERTED_PATH=/app/converted
      - SUBTITLE_MAX_FILE_SIZE=10485760
      - TZ=Europe/Moscow
    volumes:
      - ./uploads:/app/uploads:rw
      - ./converted:/app/converted:rw
      - ./logs:/app/logs:rw
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=100M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/subtitle/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s