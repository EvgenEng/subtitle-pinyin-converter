spring:
  application:
    name: subtitle-pinyin-converter

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      location: ${java.io.tmpdir}
      file-size-threshold: 2KB
      resolve-lazily: true

  messages:
    basename: messages
    encoding: UTF-8

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# ===============================
# Custom application properties
# ===============================
subtitle:
  upload:
    path: ${user.home}/subtitle/uploads
  converted:
    path: ${user.home}/subtitle/converted

  max-file-size: 10485760

  pinyin:
    cache-size: 500
    cache-ttl-minutes: 30

# ===============================
# Logging configuration
# ===============================
logging:
  level:
    root: INFO
    com.subtitle: DEBUG
    org.springframework.web: INFO
    org.springframework.web.multipart: DEBUG

  file:
    name: ${user.home}/subtitle/logs/app.log

  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] [%thread] %-5level %logger{36} - %msg%n"

# ===============================
# Management / Actuator
# ===============================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers

  endpoint:
    health:
      show-details: always

# ===============================
# DeepSeek API
# ===============================
deepseek:
  api:
    url: https://api.deepseek.com/v1/chat/completions
    key: ${DEEPSEEK_API_KEY:}
    model: deepseek-chat

# ===============================
# Security
# ===============================
app:
  api-key: ${API_KEY:dev-key}